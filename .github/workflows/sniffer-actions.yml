name: C Automated Testing

on:
  pull_request:
    branches:
      - dev # Trigger on pull requests to the dev branch

jobs:
  run-c-tests:
    name: C Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Source Branch
        run: |
          if [[ "${{ github.head_ref }}" != "sniffer" ]]; then
            echo "This workflow only runs for PRs from the 'sniffer' branch to 'dev'. Current source branch: '${{ github.head_ref }}'."
            exit 0
          fi

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libcunit1-dev libpcap-dev

      - name: Install dependencies (macOS only)
        if: runner.os == 'macOS'
        run: |
          # Install dependencies for macOS
          brew install gcc make libpcap

          # Manually install libcunit from source using a .zip archive
          curl -L https://github.com/pauljuliusmartin/cunit/archive/refs/tags/v2.1-3.zip -o cunit.zip
          unzip cunit.zip
          cd cunit-2.1-3

          # Set environment variables for libpcap
          export LDFLAGS="-L/opt/homebrew/opt/libpcap/lib"
          export CPPFLAGS="-I/opt/homebrew/opt/libpcap/include"
          export PKG_CONFIG_PATH="/opt/homebrew/opt/libpcap/lib/pkgconfig"

          # Build and install libcunit
          ./configure
          make
          sudo make install

      - name: Build the project
        run: |
          make all

      - name: Run Tests
        run: |
          make run-tests > test_output.log || exit 1

      - name: Display Test Output
        run: |
          echo "Test Results:"
          cat test_output.log || echo "No test output file found"

      - name: Check Test Results
        run: |
          if grep -q '\.\.\.FAILED' test_output.log; then
            echo "Tests failed. Please check the output."
            exit 1
          else
            echo "All tests passed."
          fi
