name: C Automated Testing

on:
  pull_request:
    branches:
      - dev # Trigger on pull requests to the dev branch

jobs:
  run-c-tests:
    name: C Tests
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest] # Add all the operating systems you want to test on

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Source Branch
        run: |
          if [ "${{ github.head_ref }}" != "sniffer" ]; then
            echo "This workflow only runs for PRs from the 'sniffer' branch to 'dev'. Current source branch: '${{ github.head_ref }}'."
            exit 0
          fi
        shell: bash # Ensure Bash is used on Linux/macOS

      - name: Verify Source Branch (Windows)
        run: |
          if ($env:GITHUB_HEAD_REF -ne "sniffer") {
            Write-Host "This workflow only runs for PRs from the 'sniffer' branch to 'dev'. Current source branch: $env:GITHUB_HEAD_REF."
            exit 0
          }
        shell: pwsh # Use PowerShell shell for Windows

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libcunit1-dev libpcap-dev

      - name: Install dependencies (macOS only)
        if: runner.os == 'macOS'
        run: |
          brew install gcc make cunit libpcap

      - name: Install dependencies (Windows only)
        if: runner.os == 'Windows'
        run: |
          choco install mingw make -y

          # Attempt to install Npcap via Chocolatey
          choco install npcap --params "/S" -y > install_log.txt; tail -n 20 install_log.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Npcap installation failed via Chocolatey. Trying direct installer."
            
            # Fallback to direct installer if Chocolatey fails
            Invoke-WebRequest -Uri "https://nmap.org/npcap/dist/npcap-1.80.exe" -OutFile "npcap-1.80.exe"
            
            # Start installation with timeout (in seconds)
            $process = Start-Process -FilePath "npcap-1.80.exe" -ArgumentList "/S" -NoNewWindow -PassThru
            $process.WaitForExit(600)  # Wait for 10 minutes (600 seconds)
            
            # Check if process exited successfully
            if ($process.HasExited -eq $false) {
              Write-Host "Npcap installation timed out."
              $process.Kill()
            } else {
              Write-Host "Npcap installation completed successfully."
            }
          }

          # Refresh environment variables after installation
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Build the project
        run: |
          make all

      - name: Run Tests
        run: |
          make run-tests > test_output.log || exit 1

      - name: Display Test Output
        run: |
          echo "Test Results:"
          cat test_output.log || echo "No test output file found"

      - name: Check Test Results
        run: |
          if grep -q '\.\.\.FAILED' test_output.log; then
            echo "Tests failed. Please check the output."
            exit 1
          else
            echo "All tests passed."
          fi
