name: C Automated Testing

on:
  pull_request:

jobs:
  validate-branch:
    name: Validate Sniffer Branch Target
    runs-on: ubuntu-latest

    steps:
      - name: Check Sniffer Branch Target
        run: |
          if [[ "${{ github.head_ref }}" == "sniffer" && "${{ github.base_ref }}" != "dev" ]]; then
            echo "The 'sniffer' branch can only merge into the 'dev' branch. Found target branch '${{ github.base_ref }}'."
            exit 1
          fi

  run-c-tests:
    name: C Tests
    runs-on: ubuntu-latest
    needs: validate-branch

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libcunit1-dev libpcap-dev

      - name: Build the project
        run: |
          make all

      - name: Run Tests
        run: |
          make run-tests > test_output.log || exit 1

      - name: Display Test Output
        run: |
          echo "Test Results:"
          cat test_output.log || echo "No test output file found"

      - name: Check Test Results
        run: |
          if grep -q '\.\.\.FAILED' test_output.log; then
            echo "Tests failed. Please check the output."
            exit 1
          else
            echo "All tests passed."
          fi
