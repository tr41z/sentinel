name: "publish"

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - name: Install dependencies (macOS only)
        run: |
          brew install cmake make libpcap

      - name: Install frontend dependencies
        run: yarn install

      - name: Extract version from src-tauri/tauri.conf.json (macOS)
        id: version
        shell: pwsh
        run: |
          $VERSION = (jq -r .version src-tauri/tauri.conf.json)
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Build Sniffer executable
        run: |
          mkdir -p sniffer-mod/build
          cmake -S sniffer-mod -B sniffer-mod/build
          make -C sniffer-mod/build

      - name: Move executable to src-tauri/bin
        run: |
          mkdir -p src-tauri/bin
          mv sniffer-mod/build/sniffer src-tauri/bin/

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
        with:
          tagName: "sentinel-v${{ env.VERSION }}"
          releaseName: "sentinel v${{ env.VERSION }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: "--target aarch64-apple-darwin"
